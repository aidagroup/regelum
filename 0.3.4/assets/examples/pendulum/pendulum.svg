<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Pendulum diagram</title>
  <desc id="desc">A damped pendulum with angle theta, pivot, rod, bob, gravity, and optional control torque.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="torque-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <g transform="translate(480 92)">
    <line x1="-260" y1="0" x2="260" y2="0" stroke="#0f172a" stroke-width="8" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="18" fill="#0f172a"/>
    <line x1="0" y1="0" x2="158" y2="306" stroke="#475569" stroke-width="10" stroke-linecap="round"/>
    <circle cx="158" cy="306" r="52" fill="#7c3aed" stroke="#4c1d95" stroke-width="8"/>
    <line x1="0" y1="0" x2="0" y2="340" stroke="#94a3b8" stroke-width="4" stroke-dasharray="12 12"/>
    <path d="M 0 105 A 105 105 0 0 1 48 93" fill="none" stroke="#0891b2" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="58" y="101" fill="#0e7490" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">θ</text>
    <line x1="260" y1="122" x2="260" y2="240" stroke="#334155" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="286" y="195" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">g</text>
    <path d="M 104 268 C 48 228 52 160 104 126" fill="none" stroke="#d97706" stroke-width="8" stroke-linecap="round" marker-end="url(#torque-arrow)"/>
    <text x="-6" y="204" fill="#b45309" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">τ</text>
    <text x="178" y="324" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">m</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#111827">
    <text x="64" y="78" font-size="34" font-weight="800">Pendulum plant</text>
    <text x="64" y="122" font-size="24">state: θ, ω</text>
    <text x="64" y="158" font-size="24">free dynamics or torque-driven dynamics</text>
  </g>
</svg>
