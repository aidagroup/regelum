site_name: regelum
site_description: Typed node and phase runtime for reactive systems.
site_url: https://regelum.aidynamic.group/
repo_url: https://github.com/aidagroup/regelum
repo_name: aidagroup/regelum
remote_name: origin
remote_branch: gh-pages

watch:
  - docs
  - mkdocs.yml
  - examples
  - src/regelum
  - README.md

theme:
  name: material
  logo: assets/logo/logo_mark_black_transparent.png
  favicon: assets/logo/logo_mark_black_transparent.png
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to system preference
  features:
    - navigation.sections
    - navigation.instant
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search
  - mike:
      alias_type: copy
      canonical_version: latest

extra:
  version:
    provider: mike
    default: latest
    alias: true

nav:
  - Home: index.md
  - Learn:
      - Overview: concepts/index.md
      - Nodes: concepts/nodes.md
      - Phases: concepts/phases.md
      - Continuous Dynamics: concepts/continuous.md
      - Create, Compile, and Run: concepts/compilation.md
  - Authors: authors.md

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - stylesheets/extra.css
