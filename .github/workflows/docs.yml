name: Deploy Docs

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-release
  cancel-in-progress: false

jobs:
  publish-versioned-docs:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --group docs

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch gh-pages if present
        run: git fetch origin gh-pages --depth=1 || true

      - name: Publish versioned docs with mike
        run: |
          set -eu
          DOCS_VERSION="${RELEASE_TAG#v}"
          uv run --group docs mike deploy \
            --branch gh-pages \
            --remote origin \
            --push \
            --update-aliases \
            --alias-type copy \
            "$DOCS_VERSION" latest
          uv run --group docs mike set-default \
            --branch gh-pages \
            --remote origin \
            --push \
            latest

      - name: Export gh-pages site artifact
        run: |
          rm -rf site-versioned
          git worktree add site-versioned gh-pages

      - name: Upload versioned docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-versioned
          path: site-versioned

  deploy-regelum-aidynamic-group:
    needs: publish-versioned-docs
    runs-on: ubuntu-latest
    steps:
      - name: Download versioned docs artifact
        uses: actions/download-artifact@v4
        with:
          name: site-versioned
          path: site-versioned

      - name: Install rsync and sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync sshpass

      - name: Sync docs to external host
        env:
          SSH_REMOTE: ${{ secrets.SSH_REMOTE }}
          SSH_REMOTE_USER: ${{ secrets.SSH_REMOTE_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_REMOTE_PATH: /var/www/u2139308/data/www/regelum.aidynamic.group
        run: |
          set -eu

          : "${SSH_REMOTE:?Missing SSH_REMOTE secret}"
          : "${SSH_REMOTE_USER:?Missing SSH_REMOTE_USER secret}"
          : "${SSH_PASSWORD:?Missing SSH_PASSWORD secret}"

          export SSHPASS="$SSH_PASSWORD"
          sshpass -e ssh -o StrictHostKeyChecking=no \
            "${SSH_REMOTE_USER}@${SSH_REMOTE}" \
            "mkdir -p '${SSH_REMOTE_PATH}'"

          sshpass -e rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude '.git/' \
            site-versioned/ "${SSH_REMOTE_USER}@${SSH_REMOTE}:${SSH_REMOTE_PATH}/"
