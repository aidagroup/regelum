name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: uv sync --locked --group docs

      - name: Build docs
        run: uv run --group docs mkdocs build --strict

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Upload docs artifact for external deploy
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-external:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: site

      - name: Install rsync and sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync sshpass

      - name: Sync docs to external host
        env:
          SSH_REMOTE: ${{ secrets.SSH_REMOTE }}
          SSH_REMOTE_USER: ${{ secrets.SSH_REMOTE_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_REMOTE_PATH: /var/www/u2139308/data/www/regelum.aidynamic.group
        run: |
          set -eu

          : "${SSH_REMOTE:?Missing SSH_REMOTE secret}"
          : "${SSH_REMOTE_USER:?Missing SSH_REMOTE_USER secret}"
          : "${SSH_PASSWORD:?Missing SSH_PASSWORD secret}"

          export SSHPASS="$SSH_PASSWORD"
          sshpass -e ssh -o StrictHostKeyChecking=no \
            "${SSH_REMOTE_USER}@${SSH_REMOTE}" \
            "mkdir -p '${SSH_REMOTE_PATH}'"

          sshpass -e rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            site/ "${SSH_REMOTE_USER}@${SSH_REMOTE}:${SSH_REMOTE_PATH}/"
