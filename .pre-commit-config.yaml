default_stages:
  - pre-commit

repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --group dev ruff check --fix
        language: system
        types_or: [python, pyi]

      - id: ruff-format
        name: ruff format
        entry: uv run --group dev ruff format
        language: system
        types_or: [python, pyi]

      - id: ty-check
        name: ty check
        entry: uv run --group dev ty check src tests
        language: system
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: uv run --group dev pytest tests
        language: system
        pass_filenames: false
        stages: [pre-push]
